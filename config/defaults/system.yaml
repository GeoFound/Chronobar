system:
  version: "1.2"
  app_name: "chronobar"
  timezone: "Asia/Shanghai"
  log_level: "INFO"
  cache_dir: "./data/cache"
  db_url: "sqlite:///./data/app.db"
  ui_backend: "react-desktop"
  replay_dir: "./data/replay"
  bridge:
    host: "127.0.0.1"
    port: 18080
    query_protocol: "http"
    command_protocol: "http"
    subscription_protocol: "websocket"
    subscription_port: 18081
  ai:
    enabled: false
    model_provider: "local"
    local_model_path: "./models/qwen2.5-coder"
    api_endpoint: ""
    api_key: ""
    max_tokens: 4096
    timeout: 30
    temperature: 0.7
    features:
      copilot: true
      signal_generation: false
      risk_check: false
      backtest_analysis: false
      auto_tuning: false
      artifact_builder: true
      external_context: true
      memory: true
    external_context:
      enabled: false
      whitelist_mode: "strict"
      allowed_sources:
        - "shfe"
        - "dce"
        - "czce"
        - "cffex"
        - "ine"
      require_confirmation: true
    memory:
      mode: "session_only"
      retention_days: 30
      allow_user_delete: true
      capture_user_preferences: true
    apply_policy:
      require_confirmation: true
      allow_workspace_write: true
      allow_strategy_write: true
      allow_high_risk_actions: false
