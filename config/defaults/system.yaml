system:
  version: "1.2"
  app_name: "chronobar"
  timezone: "Asia/Shanghai"
  log_level: "INFO"
  cache_dir: "./data/cache"
  db_url: "sqlite:///./data/app.db"
  ui_backend: "react-desktop"
  replay_dir: "./data/replay"
  bridge:
    host: "127.0.0.1"
    port: 18080
    query_protocol: "http"
    command_protocol: "http"
    subscription_protocol: "websocket"
    subscription_port: 18081
  ai:
    enabled: false
    model_provider: "local"
    local_model_path: "./models/qwen2.5-coder"
    api_endpoint: ""
    api_key: ""
    max_tokens: 4096
    timeout: 30
    temperature: 0.7
    enable_copilot: true
    enable_signal_generation: false
    enable_risk_check: false
    enable_backtest_analysis: false
    enable_auto_tuning: false
